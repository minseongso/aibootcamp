<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub & Vercel 배포 과제</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#4f46e5,#3b82f6);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    text-align:center;
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    color:#222;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

.info{
    background:#f5f7ff;
    padding:18px;
    border-radius:12px;
    margin-bottom:25px;
    text-align:left;
}

.info p{
    margin:8px 0;
}

.status{
    display:inline-block;
    background:#22c55e;
    color:white;
    padding:8px 18px;
    border-radius:30px;
    font-weight:bold;
    margin-bottom:25px;
}

.buttons{
    display:flex;
    gap:15px;
    justify-content:center;
}

button{
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.github{
    background:#24292f;
    color:white;
}

.vercel{
    background:#000;
    color:white;
}

button:hover{
    transform:translateY(-3px);
    opacity:.9;
}

.footer{
    margin-top:25px;
    color:#888;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

    <div class="icon">🚀</div>

    <h1>GitHub & Vercel 배포</h1>

    <p class="subtitle">
        HTML 프로젝트 배포 테스트 페이지
    </p>

    <div class="status">
        ✔ Deployment Ready
    </div>

    <div class="info">
        <p><strong>이름</strong> : 소민성</p>
        <p><strong>과목</strong> : 웹 프로그래밍</p>
        <p><strong>과제</strong> : GitHub와 Vercel 배포</p>
        <p><strong>상태</strong> : 완료</p>
    </div>

    <div class="buttons">
        <button class="github" onclick="alert('GitHub Repository')">
            GitHub
        </button>

        <button class="vercel" onclick="alert('Vercel Deployment')">
            Vercel
        </button>
    </div>

    <div class="footer">
        © 2026 Minseong So
    </div>

</div>

</body>
</html>
